# ============================================================================
# UnleashedSMP - GUI Configuration
# ============================================================================

main-title: "<gold>UnleashedSMP</gold>"
main-rows: 54
animations: true
animation-speed: 10

# Slot layout for the main menu (0-indexed). -1 = empty filler.
main-menu:
  events-slot: 19
  lucky-slot: 21
  mutant-slot: 23
  stats-slot: 25
  admin-slot: 49
  close-slot: 45

# Filler item for empty slots.
filler:
  material: BLACK_STAINED_GLASS_PANE
  name: " "

# Pagination
pagination:
  items-per-page: 45
  next-slot: 53
  previous-slot: 45

# Confirmation menu
confirmation:
  confirm-material: GREEN_WOOL
  cancel-material: RED_WOOL
  confirm-slot: 11
  cancel-slot: 15

# Category colors
categories:
  events: "<aqua>"
  lucky: "<gold>"
  mutants: "<dark_red>"
  admin: "<red>"
