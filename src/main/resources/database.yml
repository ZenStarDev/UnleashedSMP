# ============================================================================
# UnleashedSMP - Database Configuration
# ============================================================================
# Supported types: sqlite | mysql | mariadb
# ============================================================================

type: sqlite

sqlite:
  file: "plugins/UnleashedSMP/data.db"

mysql:
  host: "localhost"
  port: 3306
  database: "unleashedsmp"
  username: "root"
  password: ""
  pool:
    maximum-pool-size: 10
    minimum-idle: 2
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

mariadb:
  host: "localhost"
  port: 3306
  database: "unleashedsmp"
  username: "root"
  password: ""
  pool:
    maximum-pool-size: 10
    minimum-idle: 2
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

# Table prefix to avoid collisions.
table-prefix: "unleashed_"
