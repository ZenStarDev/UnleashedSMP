# UnleashedSMP - English (United States)
# MiniMessage formatting supported. Placeholders: %player%, %event%, %luck%, %mutant%
prefix: "<gradient:#ff6a00:#ffd700>[UnleashedSMP]</gradient> "
no-permission: "%prefix% <red>You do not have permission to do that.</red>"
reload-success: "%prefix% <green>Configuration reloaded successfully.</green>"
reload-failed: "%prefix% <red>Reload failed: %reason%</red>"
player-only: "%prefix% <red>This command can only be used by players.</red>"
invalid-usage: "%prefix% <yellow>Usage: %usage%</yellow>"
unknown-command: "%prefix% <red>Unknown subcommand. Use /unleashed help</red>"
event-started: "%prefix% <gold>Event <aqua>%event%</aqua> has started!</gold>"
event-stopped: "%prefix% <gray>Event <aqua>%event%</aqua> has ended.</gray>"
event-not-found: "%prefix% <red>Event '%event%' was not found.</red>"
event-already-running: "%prefix% <yellow>Event '%event%' is already running.</yellow>"
event-disabled: "%prefix% <red>Event '%event%' is disabled.</red>"
event-cooldown: "%prefix% <yellow>Event '%event%' is on cooldown (%time%s).</yellow>"
event-no-active: "%prefix% <gray>There are no active events.</gray>"
event-list-header: "%prefix% <gold>Active Events:</gold>"
event-list-entry: " <gray>-</gray> <aqua>%event%</aqua> <gray>(%remaining%s left)</gray>"
lucky-cooldown: "%prefix% <yellow>You must wait %time%s before using /lucky again.</yellow>"
lucky-good: "%prefix% <green>Lucky! %effect%</green>"
lucky-bad: "%prefix% <red>Unlucky! %effect%</red>"
lucky-neutral: "%prefix% <gray>%effect%</gray>"
lucky-none: "%prefix% <gray>Nothing happened...</gray>"
mutant-spawned: "%prefix% <dark_red>A <aqua>%mutant%</aqua> has appeared!</dark_red>"
mutant-killed: "%prefix% <green>You defeated the <aqua>%mutant%</aqua>!</green>"
gui-main-title: "<gold>UnleashedSMP</gold>"
gui-events-title: "<gold>Event Menu</gold>"
gui-lucky-title: "<gold>Lucky Menu</gold>"
gui-close: "<red>Close</red>"
gui-next: "<aqua>Next Page</aqua>"
gui-previous: "<aqua>Previous Page</aqua>"
gui-confirm: "<green>Confirm</green>"
gui-cancel: "<red>Cancel</red>"
debug-enabled: "%prefix% <green>Debug mode enabled.</green>"
debug-disabled: "%prefix% <red>Debug mode disabled.</red>"
help-header: "%prefix% <gold>UnleashedSMP Commands</gold>"
help-line: " <gray>/</gray><aqua>%command%</aqua> <gray>-</gray> %description%"
help-footer: "%prefix% <gray>Visit the wiki for more information.</gray>"
