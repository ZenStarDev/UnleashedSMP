# UnleashedSMP - ไทย (ประเทศไทย)
# รองรับการจัดรูปแบบ MiniMessage ตัวแปร: %player%, %event%, %luck%, %mutant%
prefix: "<gradient:#ff6a00:#ffd700>[UnleashedSMP]</gradient> "
no-permission: "%prefix% <red>คุณไม่มีสิทธิ์ในการทำสิ่งนี้</red>"
reload-success: "%prefix% <green>โหลดการตั้งค่าใหม่เรียบร้อยแล้ว</green>"
reload-failed: "%prefix% <red>การโหลดใหม่ล้มเหลว: %reason%</red>"
player-only: "%prefix% <red>คำสั่งนี้ใช้ได้เฉพาะผู้เล่นเท่านั้น</red>"
invalid-usage: "%prefix% <yellow>การใช้งาน: %usage%</yellow>"
unknown-command: "%prefix% <red>ไม่พบคำสั่งย่อ ใช้ /unleashed help</red>"
event-started: "%prefix% <gold>อีเวนต์ <aqua>%event%</aqua> เริ่มขึ้นแล้ว!</gold>"
event-stopped: "%prefix% <gray>อีเวนต์ <aqua>%event%</aqua> สิ้นสุดลงแล้ว</gray>"
event-not-found: "%prefix% <red>ไม่พบอีเวนต์ '%event%'</red>"
event-already-running: "%prefix% <yellow>อีเวนต์ '%event%' กำลังทำงานอยู่แล้ว</yellow>"
event-disabled: "%prefix% <red>อีเวนต์ '%event%' ถูกปิดการทำงาน</red>"
event-cooldown: "%prefix% <yellow>อีเวนต์ '%event%' อยู่ในช่วงคูลดาวน์ (%time% วินาที)</yellow>"
event-no-active: "%prefix% <gray>ไม่มีอีเวนต์ที่กำลังทำงานอยู่</gray>"
event-list-header: "%prefix% <gold>อีเวนต์ที่กำลังทำงาน:</gold>"
event-list-entry: " <gray>-</gray> <aqua>%event%</aqua> <gray>(เหลืออีก %remaining% วินาที)</gray>"
lucky-cooldown: "%prefix% <yellow>คุณต้องรออีก %time% วินาที before ใช้ /lucky ได้</yellow>"
lucky-good: "%prefix% <green>โชคดี! %effect%</green>"
lucky-bad: "%prefix% <red>โชคร้าย! %effect%</red>"
lucky-neutral: "%prefix% <gray>%effect%</gray>"
lucky-none: "%prefix% <gray>ไม่มีอะไรเกิดขึ้น...</gray>"
mutant-spawned: "%prefix% <dark_red>มอนสเตอร์ <aqua>%mutant%</aqua> ปรากฏตัวแล้ว!</dark_red>"
mutant-killed: "%prefix% <green>คุณเอาชนะ <aqua>%mutant%</aqua> ได้แล้ว!</green>"
gui-main-title: "<gold>UnleashedSMP</gold>"
gui-events-title: "<gold>เมนูอีเวนต์</gold>"
gui-lucky-title: "<gold>เมนูโชคดี</gold>"
gui-close: "<red>ปิด</red>"
gui-next: "<aqua>หน้าถัดไป</aqua>"
gui-previous: "<aqua>หน้าก่อนหน้า</aqua>"
gui-confirm: "<green>ยืนยัน</green>"
gui-cancel: "<red>ยกเลิก</red>"
debug-enabled: "%prefix% <green>เปิดโหมดดีบักแล้ว</green>"
debug-disabled: "%prefix% <red>ปิดโหมดดีบักแล้ว</red>"
help-header: "%prefix% <gold>คำสั่ง UnleashedSMP</gold>"
help-line: " <gray>/</gray><aqua>%command%</aqua> <gray>-</gray> %description%"
help-footer: "%prefix% <gray>เยี่ยมชมวิกิสำหรับข้อมูลเพิ่มเติม</gray>"
